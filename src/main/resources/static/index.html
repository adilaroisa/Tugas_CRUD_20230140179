<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Data KTP</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="container">
    <h2>Manajemen Data KTP</h2>

    <div class="form-section">
        <form id="ktpForm">
            <input type="hidden" id="idKtp">

            <div class="form-group">
                <label>Nomor KTP:</label>
                <input type="text" id="nomorKtp" required>
            </div>
            <div class="form-group">
                <label>Nama Lengkap:</label>
                <input type="text" id="namaLengkap" required>
            </div>
            <div class="form-group">
                <label>Alamat:</label>
                <input type="text" id="alamat" required>
            </div>
            <div class="form-group">
                <label>Tanggal Lahir:</label>
                <input type="date" id="tanggalLahir" required>
            </div>
            <div class="form-group">
                <label>Jenis Kelamin:</label>
                <select id="jenisKelamin" required>
                    <option value="">Pilih Jenis Kelamin</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <button type="submit" id="btnSave">Simpan Data</button>
            <button type="button" id="btnCancel" style="display: none;">Batal Edit</button>
        </form>
    </div>

    <div class="table-section">
        <table id="ktpTable">
            <thead>
            <tr>
                <th>No</th>
                <th>Nomor KTP</th>
                <th>Nama Lengkap</th>
                <th>Alamat</th>
                <th>Tanggal Lahir</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
